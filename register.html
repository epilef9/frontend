<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <title>Registro</title>
  <style>
    body {
      background-color: #f8f9fa;
      min-height: 100vh;
    }
  </style>
</head>
<body class="d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-9 col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-3 text-center">Crear cuenta</h1>
            <p class="text-muted text-center mb-4">Completa el formulario para registrarte</p>

            <form>
              <div class="form-group">
                <label for="name">Nombre completo</label>
                <input type="text" class="form-control" id="name" placeholder="Tu nombre" required>
              </div>

              <div class="form-group">
                <label for="email">Correo electronico</label>
                <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required>
              </div>

              <div class="form-group">
                <label for="password">Contrasena</label>
                <input type="password" class="form-control" id="password" placeholder="********" required>
              </div>

              <div class="form-group">
                <label for="confirm-password">Confirmar contrasena</label>
                <input type="password" class="form-control" id="confirm-password" placeholder="********" required>
              </div>

              <button type="submit" class="btn btn-success btn-block mb-2">Registrarme</button>
              <a href="index.html" class="btn btn-outline-secondary btn-block">Volver al inicio</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
